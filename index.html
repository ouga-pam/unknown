<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>PAM | Profile</title>
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background-color: #0d0d0d;
      color: #eaeaea;
      line-height: 1.6;
    }

    .container {
      max-width: 800px;
      margin: 80px auto;
      padding: 20px;
    }

    h1 {
      font-size: 48px;
      letter-spacing: 4px;
      margin-bottom: 10px;
    }

    .tagline {
      color: #888;
      margin-bottom: 40px;
      font-size: 14px;
      letter-spacing: 2px;
    }

    h2 {
      border-bottom: 1px solid #333;
      padding-bottom: 5px;
      margin-top: 40px;
      font-size: 18px;
      letter-spacing: 2px;
    }

    p {
      color: #ccc;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    ul li {
      padding: 5px 0;
      border-bottom: 1px solid #222;
      color: #aaa;
    }

    .message {
      margin-top: 40px;
      font-style: italic;
      color: #999;
    }

    footer {
      margin-top: 60px;
      font-size: 12px;
      color: #555;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="container">
    
    <h1>PAM</h1>
    <div class="tagline">Stay sharp. Stay minimal.</div>

    <h2>ABOUT</h2>
    <p>
      無駄を削ぎ落とし、本質だけを残す。<br>
      流されない、自分のスタイルを貫く。<br>
      静かに、でも確実に存在感を残す。
    </p>

    <h2>STYLE</h2>
    <ul>
      <li>Minimal</li>
      <li>Cool</li>
      <li>Stoic</li>
      <li>Authentic</li>
    </ul>

    <h2>SKILLS / INTERESTS</h2>
    <ul>
      <li>Creative Thinking</li>
      <li>Design Sense</li>
      <li>Original Perspective</li>
      <li>Self Expression</li>
    </ul>

    <div class="message">
      言葉は少なくてもいい。<br>
      伝わるものだけが、価値になる。
    </div>

    <footer>
      © PAM
    </footer>

  </div>
</body>
</html>
